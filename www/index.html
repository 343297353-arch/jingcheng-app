<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>璟程 | AI 智能酒店预订</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <!-- 页面容器 -->
    <div class="page-container">
      <!-- 首页 -->
      <div v-show="currentPage === 'home'" class="page-content" :class="pageTransition">
        <home-page></home-page>
      </div>
      
      <!-- 酒店列表 -->
      <div v-show="currentPage === 'hotels'" class="page-content" :class="pageTransition">
        <hotels-page></hotels-page>
      </div>
      
      <!-- 酒店详情 -->
      <div v-show="currentPage === 'hotel-detail'" class="page-content" :class="pageTransition">
        <hotel-detail-page></hotel-detail-page>
      </div>
      
      <!-- 预订页面 -->
      <div v-show="currentPage === 'booking'" class="page-content" :class="pageTransition">
        <booking-page></booking-page>
      </div>
      
      <!-- 订单管理 -->
      <div v-show="currentPage === 'orders'" class="page-content" :class="pageTransition">
        <orders-page></orders-page>
      </div>
      
      <!-- AI 助手 -->
      <div v-show="currentPage === 'ai-assistant'" class="page-content" :class="pageTransition">
        <ai-assistant-page></ai-assistant-page>
      </div>
      
      <!-- 个人中心 -->
      <div v-show="currentPage === 'profile'" class="page-content" :class="pageTransition">
        <profile-page></profile-page>
      </div>
    </div>
    
    <!-- 底部导航栏 -->
    <div class="tab-bar" v-if="showTabBar">
      <div class="tab-item" :class="{ active: currentPage === 'home' }" @click="navigate('home')">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <span>首页</span>
      </div>
      
      <div class="tab-item" :class="{ active: currentPage === 'hotels' }" @click="navigate('hotels')">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M7 13c1.66 0 3-1.34 3-3S8.66 7 7 7s-3 1.34-3 3 1.34 3 3 3zm12-6h-8v7H3V5H1v15h2v-3h18v3h2v-9c0-2.21-1.79-4-4-4z"/>
        </svg>
        <span>酒店</span>
      </div>
      
      <div class="tab-item ai-tab" :class="{ active: currentPage === 'ai-assistant' }" @click="navigate('ai-assistant')">
        <div class="ai-tab-icon">
          <svg viewBox="0 0 24 24" fill="white">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-4h2v2h-2zm0-2h2V7h-2z"/>
          </svg>
        </div>
        <span>AI 助手</span>
      </div>
      
      <div class="tab-item" :class="{ active: currentPage === 'orders' }" @click="navigate('orders')">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <path d="M14 2v6h6" fill="none" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span>订单</span>
      </div>
      
      <div class="tab-item" :class="{ active: currentPage === 'profile' }" @click="navigate('profile')">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        <span>我的</span>
      </div>
    </div>
    
    <!-- Toast 提示 -->
    <transition name="toast">
      <div v-if="toast.show" class="toast">{{ toast.msg }}</div>
    </transition>
    
    <!-- 加载遮罩 -->
    <transition name="fade">
      <div v-if="loading" class="loading-overlay">
        <div class="spinner"></div>
        <div style="font-size:13px;color:var(--text-light)">加载中...</div>
      </div>
    </transition>
  </div>
  
  <!-- 数据（直接加载到全局） -->
  <script src="/js/data.js"></script>
  
  <!-- Vue 3 -->
  <script src="/js/vue.global.prod.js"></script>
  
  <!-- 页面组件 -->
  <script src="/js/pages/home.js"></script>
  <script src="/js/pages/hotels.js"></script>
  <script src="/js/pages/hotel-detail.js"></script>
  <script src="/js/pages/booking.js"></script>
  <script src="/js/pages/orders.js"></script>
  <script src="/js/pages/ai-assistant.js"></script>
  <script src="/js/pages/profile.js"></script>
  
  <!-- 主应用 -->
  <script src="/js/app.js"></script>
  
  <!-- Service Worker 注册 -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('Service Worker 已注册'))
        .catch(err => console.error('SW 注册失败:', err));
    }
  </script>
</body>
</html>
