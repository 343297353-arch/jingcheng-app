<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 背景 - 深空蓝 -->
  <rect width="1024" height="1024" rx="224" fill="#1a1a2e"/>
  
  <!-- 渐变叠加 -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d44;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0c94e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1024" height="1024" rx="224" fill="url(#grad1)"/>
  
  <!-- 文字 - 鎏金色 -->
  <text x="512" y="680" font-family="Arial, sans-serif" font-size="480" font-weight="bold" text-anchor="middle" fill="url(#grad2)">璟</text>
  
  <!-- 底部装饰线 -->
  <rect x="312" y="800" width="400" height="8" rx="4" fill="url(#grad2)" opacity="0.6"/>
</svg>
